name: Update box office dashboard

on:
  schedule:
    # 06:00 JST = 21:00 UTC on the previous day.
    - cron: "0 21 * * *"
  workflow_dispatch:
  push:
    paths:
      - "scripts/update-dashboard.mjs"
      - ".github/workflows/update-dashboard.yml"

permissions:
  contents: write

concurrency:
  group: toy-story-5-dashboard-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Update dashboard data
        run: node scripts/update-dashboard.mjs

      - name: Validate scripts
        run: |
          node --check app.js
          node --check data.js

      - name: Commit changed dashboard data
        run: |
          if git diff --quiet -- data.js; then
            echo "No dashboard data changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.js
          git commit -m "Daily box office update"
          git push
